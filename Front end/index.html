<!DOCTYPE html>
<html>
<head>
    <title>Cek Spam SMS Indonesia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; padding-top: 50px; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h2 class="text-center mb-4">🕵️ Deteksi Spam SMS</h2>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Masukkan isi SMS:</label>
                            <textarea class="form-control" name="sms_text" rows="4" placeholder="Contoh: Selamat anda menang..." required>{{ text_input }}</textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Cek SMS Ini</button>
                        </div>
                    </form>

                    {% if prediksi %}
                    <div class="alert alert-info mt-4 text-center" role="alert">
                        <h3>{{ prediksi }}</h3>
                    </div>
                    {% endif %}
                    
                </div>
                <p class="text-center mt-3 text-muted">Design By Kelompok 1</p>
            </div>
        </div>
    </div>
</body>
</html>
